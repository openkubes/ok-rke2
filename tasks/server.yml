---
- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Deploy RKE2 server config
  ansible.builtin.template:
    src: rke2-config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: "0600"
  notify: Restart RKE2 server

- name: Download RKE2 install script
  ansible.builtin.get_url:
    url: https://get.rke2.io
    dest: /tmp/install-rke2.sh
    mode: "0755"

- name: Install RKE2 server
  ansible.builtin.command:
    cmd: /tmp/install-rke2.sh
  environment:
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
    INSTALL_RKE2_TYPE: "server"
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start RKE2 server
  ansible.builtin.systemd:
    name: rke2-server
    enabled: true
    state: started

- name: Wait for RKE2 server to be ready
  ansible.builtin.wait_for:
    path: /etc/rancher/rke2/rke2.yaml
    timeout: 120

- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy kubeconfig
  ansible.builtin.copy:
    src: /etc/rancher/rke2/rke2.yaml
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"

- name: Add RKE2 binaries to PATH
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    line: 'export PATH=$PATH:/var/lib/rancher/rke2/bin'
    state: present

- name: Get RKE2 token
  ansible.builtin.slurp:
    src: /var/lib/rancher/rke2/server/node-token
  register: rke2_node_token
  run_once: true

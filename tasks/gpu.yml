---
- name: Wait for kubectl to be available
  ansible.builtin.wait_for:
    path: /var/lib/rancher/rke2/bin/kubectl
    timeout: 120

- name: Get node name
  ansible.builtin.command:
    cmd: /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get nodes -o jsonpath='{.items[0].metadata.name}'
  register: gpu_node_name
  changed_when: false
  delegate_to: "{{ groups['rke2_servers'][0] }}"

- name: Label GPU node
  ansible.builtin.command:
    cmd: >
      /var/lib/rancher/rke2/bin/kubectl
      --kubeconfig /etc/rancher/rke2/rke2.yaml
      label node {{ gpu_node_name.stdout }}
      {{ rke2_gpu_label }}
      --overwrite
  delegate_to: "{{ groups['rke2_servers'][0] }}"
  changed_when: true

- name: Taint GPU node
  ansible.builtin.command:
    cmd: >
      /var/lib/rancher/rke2/bin/kubectl
      --kubeconfig /etc/rancher/rke2/rke2.yaml
      taint node {{ gpu_node_name.stdout }}
      {{ rke2_gpu_taint }}
      --overwrite
  delegate_to: "{{ groups['rke2_servers'][0] }}"
  register: taint_result
  changed_when: "'tainted' in taint_result.stdout"
  failed_when:
    - taint_result.rc != 0
    - "'already' not in taint_result.stderr"
